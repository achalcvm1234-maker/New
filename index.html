<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Modern Website</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f6f9;
}

/* navbar */

nav{
background:#111;
color:white;
display:flex;
justify-content:space-between;
padding:15px 40px;
align-items:center;
}

nav h2{
margin:0;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* hero section */

.hero{
text-align:center;
padding:80px 20px;
background:linear-gradient(120deg,#4facfe,#00f2fe);
color:white;
}

.hero h1{
font-size:40px;
}

.hero button{
padding:12px 25px;
border:none;
background:white;
color:#333;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

/* cards */

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:40px;
gap:20px;
}

.card{
background:white;
padding:20px;
width:250px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:80px;
}

/* footer */

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<nav>
<h2>MySite</h2>
<div>
<a href="home.html">Home</a>
<a href="#">Services</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>
</nav>

<section class="hero">
<h1>Welcome to My Website</h1>
<p>Modern UI UX design for your project</p>
<button>Get Started</button>
</section>

<div class="container">

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
<h3>Fast</h3>
<p>Fast and responsive design.</p>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828940.png">
<h3>Secure</h3>
<p>Secure and modern technology.</p>
</div>

<div class="card">
<img src="https://cdn-icons-png.flaticon.com/512/1828/1828970.png">
<h3>Simple</h3>
<p>Clean UI/UX for users.</p>
</div>

</div>

<footer>
<p>© 2026 My Website</p>
</footer>

</body>
</html>
